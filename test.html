<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Theme Switcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind to use 'class' strategy for dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* Smooth transition for theme switching */
        .theme-transition {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body class="theme-transition bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full p-8 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 theme-transition text-center">
        <h1 class="text-3xl font-extrabold mb-2">Toggle Theme</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8">
            Click the button below to switch between light and dark mode. Your preference will be saved!
        </p>

        <button id="theme-toggle" class="relative inline-flex items-center justify-center p-0.5 mb-2 mr-2 overflow-hidden text-sm font-medium rounded-lg group bg-gradient-to-br from-purple-600 to-blue-500 group-hover:from-purple-600 group-hover:to-blue-500 hover:text-white dark:text-white focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800">
            <span class="relative px-5 py-2.5 transition-all ease-in duration-75 bg-white dark:bg-slate-900 rounded-md group-hover:bg-opacity-0">
                <span id="theme-toggle-text">Switch Theme</span>
            </span>
        </button>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeText = document.getElementById('theme-toggle-text');

        // On page load: Set the theme based on local storage or system preference
        function initTheme() {
            if (localStorage.getItem('color-theme') === 'dark' || 
                (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeText.textContent = '☀️ Light Mode';
            } else {
                document.documentElement.classList.remove('dark');
                themeText.textContent = '🌙 Dark Mode';
            }
        }

        // Handle the toggle click
        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                // Switch to light
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                themeText.textContent = '🌙 Dark Mode';
            } else {
                // Switch to dark
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                themeText.textContent = '☀️ Light Mode';
            }
        });

        // Initialize on load
        initTheme();
    </script>
</body>
</html>
