<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | DevLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100/50 text-gray-900">

    <header class="p-4 max-w-6xl mx-auto flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <a href="index.html" class="text-3xl font-black tracking-tighter">
    DEV<span class="text-blue-600">LOG.</span>
</a>
        <button id="logout-btn" class="bg-red-600/85 text-white px-6 py-2 rounded-xl font-bold text-sm">Logout</button>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12 flex flex-col items-center">
        <div class="relative mb-6">
            <div id="user-icon" class="w-32 h-32 bg-blue-100 rounded-[2.5rem] flex items-center justify-center text-4xl shadow-inner border-4 border-white">
                <span class="animate-pulse text-blue-300">...</span>
            </div>
        </div>

        <div class="text-center">
            <h1 id="display-name" class="text-3xl font-black mb-1 font-sans">Loading...</h1>
            <p id="display-email" class="text-black-400 font-medium"></p>
        </div>
        

        <div class="bg-gray-100 px-3 py-5 mt-12 w-full max-w-md space-y-4 shadow-2xl rounded-xl">
            <a href="my-posts.html" class="block w-full text-center bg-white border border-gray-100 p-4 rounded-3xl font-bold hover:shadow-lg transition">Manage My Posts</a>
            <a href="dashboard.html" class="block w-full text-center bg-blue-600 text-white p-4 rounded-3xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transition">Write New Article</a>
        </div>
    </main>

    <script type="module" src="profile.js"></script>
</body>
</html>
