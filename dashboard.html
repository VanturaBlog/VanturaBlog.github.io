<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Article | DevLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-200">

    <header class="bg-gray-50 border-b border-gray-200">
        <nav class="p-4 md:p-6 flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="text-xl font-black tracking-tighter">
                DEV<span class="text-blue-600">LOG.</span>
            </a>
            <a href="index.html" class="text-sm font-bold text-gray-400 hover:text-blue-600 transition flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Feed
            </a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6 md:py-12">
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden flex flex-col">
            
            <div class="p-6 md:p-10">
                
                <div class="group mb-8">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] mb-2 group-focus-within:text-blue-500 transition-colors">
                        Article Title
                    </label>
                    <input type="text" id="post-title" placeholder="Enter Title..." 
                           class="w-full text-4xl md:text-5xl font-black border-none outline-none placeholder-gray-100">
                </div>

                <div class="group mb-10">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] mb-2 group-focus-within:text-blue-500 transition-colors">
                        Article Summary
                    </label>
                    <textarea id="post-description" rows="1" placeholder="Add a short hook for the home page..." 
                              class="w-full bg-transparent border-none outline-none text-gray-500 text-lg md:text-xl italic leading-relaxed resize-none placeholder-gray-200 focus:text-gray-700 transition-all"></textarea>
                    <div class="h-[1px] w-full bg-gray-100 group-focus-within:bg-blue-200 transition-all"></div>
                </div>

                <div class="group">
                    <label class="block text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] mb-4 group-focus-within:text-blue-500 transition-colors">
                        Main Story
                    </label>
                    <div id="post-content" contenteditable="true" 
                         class="w-full min-h-[300px] text-lg md:text-xl outline-none text-gray-800 leading-relaxed"
                         data-placeholder="Start your story here..."></div>
                </div>
            </div>

            <div class="bg-gray-50 border-t border-b border-gray-100 p-3 flex flex-wrap gap-2 sticky bottom-[88px] z-10">
                
                <button onclick="format('bold')" class="p-2 hover:bg-white rounded-lg font-bold w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Bold">B</button>
                <button onclick="format('italic')" class="p-2 hover:bg-white rounded-lg italic w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Italic">I</button>
                <button onclick="format('strikethrough')" class="p-2 hover:bg-white rounded-lg line-through w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Strikethrough">S</button>
                
                <div class="w-[1px] h-10 bg-gray-200 mx-1"></div>
                
                <button onclick="format('justifyLeft')" class="p-2 hover:bg-white rounded-lg w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Align Left">L</button>
                <button onclick="format('justifyCenter')" class="p-2 hover:bg-white rounded-lg w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Align Center">C</button>
                <button onclick="format('justifyRight')" class="p-2 hover:bg-white rounded-lg w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Align Right">R</button>
                
                <div class="w-[1px] h-10 bg-gray-200 mx-1"></div>
                
                <button onclick="format('insertUnorderedList')" class="p-2 hover:bg-white rounded-lg w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Bullet List">•—</button>
                <button onclick="format('formatBlock', 'H2')" class="p-2 hover:bg-white rounded-lg font-black w-10 h-10 shadow-sm border border-gray-200 bg-white text-xs" title="Heading">H2</button>
                
                <button onclick="insertImage()" class="p-2 hover:bg-white rounded-lg w-10 h-10 shadow-sm border border-gray-200 bg-white" title="Add Image URL">
                    <svg class="w-full h-full text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </button>
                
                <button onclick="format('removeFormat')" class="ml-auto p-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg w-10 h-10 shadow-sm border border-red-100 flex items-center justify-center" title="Clear All Formatting">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>

            <div class="p-6 bg-white flex justify-end">
                <button id="publish-btn" class="w-full md:w-auto bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95">
                    Publish Article
                </button>
            </div>
        </div>
    </main>
    <script type="module" src="dashboard.js"></script>
    <script src="universal.js"></script>
</body>
</html>
